<!DOCTYPE html>
<html>
<head>
<title>Camera Upload</title>

<style>
body {
    text-align:center;
    background:#ede7f6;
    font-family:Arial;
}

h1 {
    color:#6a1b9a;
}

form {
    margin-top:30px;
}

input, select, button {
    padding:10px;
    margin:10px;
    font-size:16px;
}

button {
    background:#8e24aa;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover {
    background:#4a148c;
}

img {
    margin-top:20px;
    border-radius:10px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.3);
}

.result {
    font-size:20px;
    color:#4a148c;
    margin-top:15px;
}
</style>

</head>
<body>

<h1>📷 Plant Health Detection</h1>

<p>Upload plant image and select leaf color</p>

<form method="POST" enctype="multipart/form-data">
    
    <input type="file" name="image" required><br>

    <select name="color">
        <option value="green">Green (Healthy)</option>
        <option value="yellow">Yellow (Weak)</option>
        <option value="brown">Brown (Disease)</option>
    </select><br>

    <button type="submit">Upload & Analyze</button>

</form>

{% if image_path %}
    <div>
        <img src="{{ image_path }}" width="300">
        <p class="result">{{ plant_detail }}</p>
    </div>
{% endif %}

</body>
</html>
